<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Property</title>
    <style>
        div#static {
            width: 100px; height: 100px; 
            background-color: aqua;  
            left: 100px;
            top: 100px;
            border: 2px solid black;
        }
       

        div#parentrelative {
            position: relative;
            width: 400px; height: 200px; 
            background-color: orange;  
            left: 100px;
            top: 100px;
            border: 2px solid black;
        }
        div#childabs {
            position: relative;
            width: 100px; 
            height: 100px; 
            background-color: brown;  
            left: 300px;
            top: 100px;

    </style>
</head>
<body>
    <div id="static">Static</div>
    <div id="parentrelative">
        <div id="childabs"></div>
</body>
</html>
